worker_processes 1;
events { worker_connections 1024; }

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;

      hls on;
      hls_path /tmp/hls;
      hls_fragment 2s;
      hls_playlist_length 10s;
    }
  }
}

http {
  server {
    listen 8080;

    location /hls {
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      root /tmp;
      add_header Cache-Control no-cache;
      add_header Access-Control-Allow-Origin "https://admin.chalesuicacearense.com" always;
      add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Origin, Accept" always;
      add_header Access-Control-Allow-Credentials "true" always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      auth_basic "Acesso Restrito";
      auth_basic_user_file /etc/nginx/.htpasswd;
    }

    location /ping {
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }
}
